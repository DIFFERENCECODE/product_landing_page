<svg viewBox="0 0 500 240" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="500" height="240" fill="#111827" rx="10"/>

  <!-- Plot area clip -->
  <defs>
    <clipPath id="plot">
      <rect x="55" y="28" width="425" height="162"/>
    </clipPath>
  </defs>

  <!-- Axis labels (Y) -->
  <!-- y_scale = 162/3 = 54 px per unit. y_pos(v) = 190 - (v-50.5)*54 -->
  <!-- 53.5 → y=28  53.0 → y=55  52.5 → y=82  52.0 → y=109  51.5 → y=136  51.0 → y=163  50.5 → y=190 -->
  <text x="50" y="32"  text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">53.5</text>
  <text x="50" y="59"  text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">53.0</text>
  <text x="50" y="86"  text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">52.5</text>
  <text x="50" y="113" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">52.0</text>
  <text x="50" y="140" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">51.5</text>
  <text x="50" y="167" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">51.0</text>
  <text x="50" y="194" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="9.5">50.5</text>

  <!-- Horizontal grid lines -->
  <g stroke="rgba(255,255,255,0.07)" stroke-width="1" clip-path="url(#plot)">
    <line x1="55" y1="28"  x2="480" y2="28"/>
    <line x1="55" y1="55"  x2="480" y2="55"/>
    <line x1="55" y1="82"  x2="480" y2="82"/>
    <line x1="55" y1="109" x2="480" y2="109"/>
    <line x1="55" y1="136" x2="480" y2="136"/>
    <line x1="55" y1="163" x2="480" y2="163"/>
    <line x1="55" y1="190" x2="480" y2="190"/>
  </g>

  <!-- Vertical grid lines at each month tick -->
  <!-- x ticks: Jan=55, Feb=140, Mar=225, Apr=310, May=395, Jun=480 -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="55"  y1="28" x2="55"  y2="190"/>
    <line x1="140" y1="28" x2="140" y2="190"/>
    <line x1="225" y1="28" x2="225" y2="190"/>
    <line x1="310" y1="28" x2="310" y2="190"/>
    <line x1="395" y1="28" x2="395" y2="190"/>
    <line x1="480" y1="28" x2="480" y2="190"/>
  </g>

  <!-- X-axis labels -->
  <g fill="rgba(255,255,255,0.4)" font-size="9.5" text-anchor="middle">
    <text x="55"  y="207">01/01</text>
    <text x="140" y="207">02/01</text>
    <text x="225" y="207">03/01</text>
    <text x="310" y="207">04/01</text>
    <text x="395" y="207">05/01</text>
    <text x="480" y="207">06/01</text>
  </g>

  <!-- OUR TARGET line — flat at 51.0 → y=163 -->
  <line x1="55" y1="163" x2="480" y2="163"
        stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7" clip-path="url(#plot)"/>

  <!-- YOU scatter dots — descending trend from ~53.3 to ~51.2 -->
  <!-- y_pos(v) = 190 - (v-50.5)*54 -->
  <!-- Jan (x≈55±12) -->
  <circle cx="48"  cy="41"  r="4.5" fill="#f87171"/>  <!-- 53.3 -->
  <circle cx="62"  cy="52"  r="4.5" fill="#f87171"/>  <!-- 53.1 -->
  <circle cx="55"  cy="35"  r="4.5" fill="#f87171"/>  <!-- 53.4 -->
  <!-- Feb (x≈140±10) -->
  <circle cx="133" cy="68"  r="4.5" fill="#f87171"/>  <!-- 52.8 -->
  <circle cx="147" cy="82"  r="4.5" fill="#f87171"/>  <!-- 52.5 -->
  <circle cx="140" cy="74"  r="4.5" fill="#f87171"/>  <!-- 52.6 -->
  <!-- Mar (x≈225±10) -->
  <circle cx="218" cy="95"  r="4.5" fill="#f87171"/>  <!-- 52.3 -->
  <circle cx="232" cy="109" r="4.5" fill="#f87171"/>  <!-- 52.0 -->
  <circle cx="225" cy="102" r="4.5" fill="#f87171"/>  <!-- 52.1 -->
  <!-- Apr (x≈310±10) -->
  <circle cx="303" cy="120" r="4.5" fill="#f87171"/>  <!-- 51.8 -->
  <circle cx="317" cy="114" r="4.5" fill="#f87171"/>  <!-- 51.9 -->
  <circle cx="310" cy="127" r="4.5" fill="#f87171"/>  <!-- 51.7 -->
  <!-- May (x≈395±10) -->
  <circle cx="388" cy="136" r="4.5" fill="#f87171"/>  <!-- 51.5 -->
  <circle cx="402" cy="131" r="4.5" fill="#f87171"/>  <!-- 51.6 -->
  <circle cx="395" cy="142" r="4.5" fill="#f87171"/>  <!-- 51.4 -->
  <!-- Jun (x≈480±10) -->
  <circle cx="473" cy="152" r="4.5" fill="#f87171"/>  <!-- 51.2 -->
  <circle cx="480" cy="163" r="4.5" fill="#f87171"/>  <!-- 51.0 -->
  <circle cx="480" cy="158" r="4.5" fill="#f87171"/>  <!-- 51.1 -->

  <!-- Legend -->
  <circle cx="64"  cy="224" r="4" fill="#f87171"/>
  <text x="72"  y="228" fill="rgba(255,255,255,0.6)" font-size="10">YOU</text>
  <line  x1="104" y1="224" x2="122" y2="224" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="127" y="228" fill="rgba(255,255,255,0.6)" font-size="10">OUR TARGET</text>
</svg>
