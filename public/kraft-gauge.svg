<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="320" height="260" fill="#111827" rx="10"/>

  <!-- Title row -->
  <circle cx="16" cy="18" r="5" fill="#f87171"/>
  <text x="26" y="23" fill="rgba(255,255,255,0.55)" font-size="11">KRAFT Deep Fat Score</text>

  <!-- Background arc track (240° sweep, large-arc-flag=1) -->
  <!-- centre 160,165  r=115  start (60.4,222.5) → end (259.6,222.5) -->
  <path d="M60.4 222.5 A115 115 0 1 1 259.6 222.5"
        stroke="rgba(255,255,255,0.07)" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Zone colour bands -->
  <!-- Green  f 0→0.16  end (46.2,148.2) sweep=38.4° laf=0 -->
  <path d="M60.4 222.5 A115 115 0 0 1 46.2 148.2"
        stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="butt" opacity="0.35"/>
  <!-- Yellow-green  f 0.16→0.32  end (81.6,80.9) sweep=38.4° laf=0 -->
  <path d="M46.2 148.2 A115 115 0 0 1 81.6 80.9"
        stroke="#a3e635" stroke-width="4" fill="none" stroke-linecap="butt" opacity="0.35"/>
  <!-- Amber  f 0.32→0.64  end (223.5,69.1) sweep=76.8° laf=0 -->
  <path d="M81.6 80.9 A115 115 0 0 1 223.5 69.1"
        stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="butt" opacity="0.35"/>
  <!-- Red  f 0.64→1.0  end (259.6,222.5) sweep=86.4° laf=0 -->
  <path d="M223.5 69.1 A115 115 0 0 1 259.6 222.5"
        stroke="#f87171" stroke-width="4" fill="none" stroke-linecap="butt" opacity="0.35"/>

  <!-- Value fill — 1.00 kg → f=0.08, tip (47.0,186.5), sweep=19.2° laf=0 -->
  <path d="M60.4 222.5 A115 115 0 0 1 47.0 186.5"
        stroke="#4ade80" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Needle tip -->
  <circle cx="47.0" cy="186.5" r="13" fill="#4ade80"/>
  <circle cx="47.0" cy="186.5" r="7"  fill="rgba(0,0,0,0.65)"/>

  <!-- Value labels -->
  <text x="160" y="160" text-anchor="middle" fill="white" font-size="46" font-weight="700">1.00</text>
  <text x="160" y="186" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="15">kg</text>

  <!-- Range ticks -->
  <text x="44"  y="238" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">0</text>
  <text x="276" y="238" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">12.5</text>
</svg>
