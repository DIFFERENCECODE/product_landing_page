# ───────────────────────────────────────────────────────────────────
# deploy.yml — auto-deploy main → EC2 (shop.meterbolic.com)
#
# Mirrors chatbot-rag/.github/workflows/deploy.yml so the platform
# uses one consistent deploy pattern. Same actions (appleboy/scp +
# ssh), same secret names — only the build step differs (Next.js
# instead of Python).
#
# Required GitHub repository secrets:
#   SERVER_HOST     — e.g. domus.meterbolic.com (or 18.156.96.26)
#   SERVER_USER     — e.g. ubuntu
#   SERVER_SSH_KEY  — private key (no passphrase) authorised on the box
#   APP_PATH        — e.g. /srv/meo-landing
#
# All four are already set in chatbot-rag's repo secrets — copy the
# same values into:
#   https://github.com/DIFFERENCECODE/product_landing_page/settings/secrets/actions
#
# Optional escape hatches:
#   - [skip-deploy] in the commit message → workflow exits early
#   - workflow_dispatch button in the Actions tab → manual re-run
# ───────────────────────────────────────────────────────────────────
name: Deploy Next.js Landing to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'RUNBOOK.md'
      - 'FUNNEL.md'
      - 'STRIPE_SETUP.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you deploying manually? (optional)'
        required: false
        default: ''

# Cancel any in-flight deploy when a new push arrives so two runs
# can't race the systemd restart.
concurrency:
  group: deploy-landing-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + ship to EC2
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-deploy]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Copy project files to EC2
        # `rm: false` keeps server-side files we don't want to delete
        # (notably .env.local with the Stripe Price IDs). The .next
        # build folder is included via the default source pattern.
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".,!node_modules,!.git,!.github,!.env.local,!.env"
          target: ${{ secrets.APP_PATH }}
          rm: false

      - name: Install deps + restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_PATH }}

            echo "→ npm ci --omit=dev"
            npm ci --omit=dev

            echo "→ restarting service"
            # Try meo-landing systemd unit first (per RUNBOOK section 4.4).
            # Fallback to 'sudo bt reload' if the system is managed by
            # BT-Panel / aaPanel — same pattern chatbot-rag uses.
            if systemctl list-unit-files | grep -q '^meo-landing.service'; then
              sudo systemctl restart meo-landing
              sudo systemctl status meo-landing --no-pager | head -10
            else
              sudo bt reload
            fi

      - name: Smoke test
        run: |
          set +e
          LIVE_URL="${LIVE_URL:-https://shop.meterbolic.com}"
          for i in 1 2 3 4 5; do
            sleep 3
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "${LIVE_URL}/")
            echo "attempt $i → ${LIVE_URL}/ returned $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Live"
              exit 0
            fi
          done
          echo "::error::Smoke test failed — ${LIVE_URL} did not return 200 after 5 attempts. Check the systemd / BT-Panel logs on the server."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### Deploy result" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${GITHUB_REF#refs/heads/}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Live**: https://shop.meterbolic.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
