name: Sync prod (main) into dev

# Keeps the dev branch (which staging is built from) in sync with
# production: any push/merge to main is automatically merged into dev,
# so changes made directly in production also land in staging.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-into-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:main
          if git merge --no-edit --no-ff main -m "auto: sync prod (main) into dev [skip-deploy]"; then
            git push origin dev
            echo "main merged into dev and pushed"
          else
            echo "merge conflict - opening PR for manual resolution"
            git merge --abort
            existing=$(gh pr list --base dev --head main --state open --json number -q '.[0].number')
            if [ -z "$existing" ]; then
              gh pr create --base dev --head main \
                --title "Sync prod (main) -> dev (conflicts need resolution)" \
                --body "Automated main->dev sync hit conflicts. Please resolve and merge so staging stays in sync with production."
            fi
          fi
